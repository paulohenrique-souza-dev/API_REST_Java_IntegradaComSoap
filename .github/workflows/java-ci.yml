name: Java CI V1


on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main


jobs:

  build:

    runs-on: ubuntu-latest


    steps:

      - name: Checkout
        uses: actions/checkout@v4


      - name: Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven


      - name: Testes
        run: ./mvnw test


      - name: Build
        run: ./mvnw clean package
